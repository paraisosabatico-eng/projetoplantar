<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Plantar — Primeira Fase</title>

    <!-- GSAP + ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: auto;
        }

        body {
            background: #F3F4F0;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* Canvas principal fixo cobrindo toda a viewport no desktop */
        #hero-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            z-index: 0;
        }

        @media (max-width: 768px) {
            #hero-canvas {
                position: relative; /* Fluxo normal no mobile */
                width: 100vw;
                height: 56.25vw; /* Mantém a proporção 16:9 do vídeo */
                z-index: 1;
            }
        }

        /* Espaço de scroll que controla o avanço do vídeo no desktop */
        .scroll-spacer {
            height: 200vh;
        }
        
        @media (max-width: 768px) {
            .scroll-spacer {
                display: none; /* No mobile o vídeo é controlado pelo seu próprio scroll */
            }
        }

        /* NAVIGATION BAR (Davita Design System) */
        .navbar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 1rem 0 1rem;
            z-index: 50;
            display: flex;
            justify-content: center;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUpNav 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeUpNav {
            to { opacity: 1; transform: translateY(0); }
        }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 4.5rem;
            width: 100%;
            max-width: 80rem;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background-color: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 10px 40px rgba(148, 163, 184, 0.16);
            padding: 0 1.5rem;
        }
        .nav-logo {
            height: 2.5rem;
            object-fit: contain;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-links {
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        @media (min-width: 768px) {
            .nav-links {
                display: flex;
            }
        }
        .nav-link {
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 400;
            color: #755738;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #755738; 
            background-color: rgba(117, 87, 56, 0.12);
            font-weight: 600;
        }
        .nav-cta {
            text-decoration: none;
            display: inline-flex;
            height: 2.5rem;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            border: 1px solid rgba(117, 87, 56, 0.25);
            background: rgba(117, 87, 56, 0.08);
            padding: 0 1.5rem;
            font-size: 1rem;
            font-weight: 400;
            color: #755738;
            box-shadow: 0 2px 10px rgba(117, 87, 56, 0.05);
            transition: all 0.3s ease;
            margin-left: 0.5rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .nav-cta:hover {
            box-shadow: 0 4px 15px rgba(117, 87, 56, 0.15);
            background: rgba(117, 87, 56, 0.18);
            border-color: rgba(117, 87, 56, 0.5);
            font-weight: 600;
        }

        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            padding: 0.5rem;
        }
        .nav-hamburger span {
            width: 24px;
            height: 2px;
            background-color: #755738;
            border-radius: 2px;
        }

        .nav-mobile-dropdown {
            display: none;
        }

        @media (max-width: 768px) {
            .navbar {
                height: 3.5rem;
                padding: 0 1rem;
                justify-content: center;
                position: relative;
            }
            .nav-brand {
                display: none;
            }
            .nav-cta {
                display: none;
            }
            .nav-hamburger {
                display: flex;
            }
            
            .nav-mobile-dropdown {
                display: none;
                position: absolute;
                top: calc(100% + 0.5rem);
                left: 0;
                width: 100%;
                background-color: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border-radius: 1.5rem;
                border: 1px solid rgba(255, 255, 255, 0.6);
                box-shadow: 0 10px 40px rgba(148, 163, 184, 0.16);
                flex-direction: column;
                padding: 1.5rem;
                gap: 1rem;
                z-index: 40;
                text-align: center;
            }
            .navbar.nav-open .nav-mobile-dropdown {
                display: flex;
                animation: fadeDownMenu 0.3s ease forwards;
            }
            .nav-mobile-dropdown .nav-link {
                padding: 1rem;
                font-size: 1.1rem;
                display: block;
            }
            .nav-mobile-dropdown .nav-cta {
                display: inline-flex;
                margin-top: 0.5rem;
                justify-content: center;
                margin-left: 0;
                width: 100%;
            }
            
            .nav-hamburger span {
                transition: all 0.3s ease;
                transform-origin: center;
            }
            .navbar.nav-open .nav-hamburger span:nth-child(1) {
                transform: translateY(6px) rotate(45deg);
            }
            .navbar.nav-open .nav-hamburger span:nth-child(2) {
                opacity: 0;
            }
            .navbar.nav-open .nav-hamburger span:nth-child(3) {
                transform: translateY(-6px) rotate(-45deg);
            }
        }
        @keyframes fadeDownMenu {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .bar-bg {
            width: 180px;
            height: 2px;
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 80ms linear;
        }

        /* Next Section Placeholder (Para permitir o scroll passar do hero no desktop) */
        .section-dobra-2 {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3rem 3rem 0 0;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
            background-color: #F3F4F0;
        }
        .dobra-2-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 4rem;
        }
        .dobra-2-content h1 {
            color: #899702;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .section-dobra-2 {
                border-radius: 0;
                box-shadow: none;
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <header class="navbar-wrapper">
        <div class="navbar">
            <div class="nav-brand">
                <a href="index.html">
                    <img src="../_ASSETS_LOCAIS/Branding/Imagens - Site/Home/Dobra 2/LogoTipografico.png" alt="Projeto Plantar" class="nav-logo">
                </a>
            </div>
            
            <div class="nav-right">
                <nav class="nav-links">
                    <a href="index.html#" class="nav-link">Projeto</a>
                    <a href="primeira-fase.html" class="nav-link">Primeira Fase</a>
                    <a href="index.html#segunda-fase" class="nav-link">Segunda Fase</a>
                </nav>

                <div class="nav-actions">
                    <a href="index.html#contato" class="nav-cta">Contato</a>
                </div>

                <!-- Menu Hamburger Mobile -->
                <div class="nav-hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            
            <!-- Menu Dropdown Mobile (Apenas visível via JS) -->
            <div class="nav-mobile-dropdown">
                <a href="index.html#" class="nav-link">Projeto</a>
                <a href="primeira-fase.html" class="nav-link">Primeira Fase</a>
                <a href="index.html#segunda-fase" class="nav-link">Segunda Fase</a>
                <a href="index.html#contato" class="nav-cta">Contato</a>
            </div>
            
        </div>
    </header>

    <!-- Loader -->
    <div id="loader">
        <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
    </div>

    <!-- Canvas -->
    <canvas id="hero-canvas"></canvas>

    <!-- Scroll trigger zone -->
    <div class="scroll-spacer" id="trigger"></div>

    <!-- Conteúdo da Página -->
    <main class="section-dobra-2">
        <div class="dobra-2-content">
            <h1>Primeira Fase</h1>
            <p>Mais detalhes sobre a primeira fase do projeto estarão aqui.</p>
        </div>
    </main>

    <script>
    (function () {
        
        // Controle do Menu Mobile (Hamburger)
        const hamburger = document.querySelector('.nav-hamburger');
        const navbar = document.querySelector('.navbar');
        if (hamburger && navbar) {
            hamburger.addEventListener('click', () => {
                navbar.classList.toggle('nav-open');
            });
            // Fecha o menu ao clicar em um link
            const mobileLinks = document.querySelectorAll('.nav-mobile-dropdown a');
            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navbar.classList.remove('nav-open');
                });
            });
        }

        /* ──────────────────────────────────────────────
           CANVAS SETUP
        ────────────────────────────────────────────── */
        const canvas = document.getElementById('hero-canvas');
        const ctx    = canvas.getContext('2d', { alpha: true }); 
        
        const DPR = window.devicePixelRatio || 1;

        function sizeCanvas() {
            canvas.width  = window.innerWidth  * DPR;
            
            if (window.innerWidth <= 768) {
                const mobileHeight = window.innerWidth * (9/16);
                canvas.height = mobileHeight * DPR;
                canvas.style.width  = window.innerWidth  + 'px';
                canvas.style.height = mobileHeight + 'px';
            } else {
                canvas.height = window.innerHeight * DPR;
                canvas.style.width  = window.innerWidth  + 'px';
                canvas.style.height = window.innerHeight + 'px';
            }
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            recalcCover();
        }

        // Cache de cover-fit (calculado uma vez, não a cada frame)
        let cover = { x: 0, y: 0, w: 0, h: 0 };

        function recalcCover() {
            const sample = imgs[0];
            if (!sample || !sample.naturalWidth) return;
            
            let r;
            if (window.innerWidth <= 768) {
                // No mobile, encaixa a largura inteira (contain horizontal) para não cortar o título
                r = canvas.width / sample.naturalWidth;
            } else {
                // No desktop, cover padrão
                r = Math.max(canvas.width / sample.naturalWidth, canvas.height / sample.naturalHeight);
            }

            cover.w = sample.naturalWidth  * r;
            cover.h = sample.naturalHeight * r;
            cover.x = (canvas.width  - cover.w) / 2;
            cover.y = (canvas.height - cover.h) / 2;
        }

        // Previne o recálculo do canvas no mobile quando a barra de endereço some/aparece
        let lastWindowWidth = window.innerWidth;
        window.addEventListener('resize', () => { 
            if (window.innerWidth !== lastWindowWidth) {
                lastWindowWidth = window.innerWidth;
                sizeCanvas(); 
                draw(); 
            }
        });

        /* ──────────────────────────────────────────────
           IMAGE SEQUENCE PRELOAD
        ────────────────────────────────────────────── */
        const TOTAL  = 145;
        const START  = 86400;
        const imgs   = [];
        let loaded   = 0;
        const state  = { frame: 0 };

        const bar    = document.getElementById('bar');
        const loader = document.getElementById('loader');

        for (let i = 0; i < TOTAL; i++) {
            const img = new Image();
            img.src = 'Jpeg Hero Primeira Fase/Timeline 2_000' + (START + i) + '.jpg';
            imgs.push(img);

            img.onload = function () {
                loaded++;
                bar.style.width = ((loaded / TOTAL) * 100) + '%';

                if (loaded === TOTAL) {
                    sizeCanvas();
                    draw();
                    initScroll();
                    // Esconde o loader
                    requestAnimationFrame(() => {
                        loader.classList.add('hidden');
                        setTimeout(() => loader.remove(), 700);
                    });
                }
            };
        }

        /* ──────────────────────────────────────────────
           DRAW — pinta o frame atual no canvas
        ────────────────────────────────────────────── */
        function draw() {
            const i = Math.round(state.frame);
            const img = imgs[i];
            if (!img || !img.naturalWidth) return;
            if (cover.w === 0) recalcCover();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, cover.x, cover.y, cover.w, cover.h);
        }

        /* ──────────────────────────────────────────────
           GSAP SCROLL ANIMATION
        ────────────────────────────────────────────── */
        function initScroll() {
            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                // No mobile, rola de acordo com o próprio elemento (que agora é relativo)
                gsap.to(state, {
                    frame: TOTAL - 1,
                    snap: 'frame',
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '#hero-canvas',
                        start: 'top 15%', // Começa logo que a navbar passa
                        end: 'bottom top',
                        scrub: 0.3,
                        onUpdate: draw
                    }
                });
            } else {
                // Desktop: usa o trigger spacer de 200vh
                gsap.to(state, {
                    frame: TOTAL - 1,
                    snap: 'frame',
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '#trigger',
                        start: 'top top',
                        end: 'bottom bottom',
                        scrub: 0.3,
                        onUpdate: draw
                    }
                });

                // Parallax sutil no canvas (só desktop)
                gsap.fromTo(canvas,
                    { scale: 1, yPercent: 0 },
                    {
                        scale: 1.12,
                        yPercent: 4,
                        ease: 'none',
                        scrollTrigger: {
                            trigger: '#trigger',
                            start: 'top top',
                            end: 'bottom bottom',
                            scrub: 0.3
                        }
                    }
                );
            }

            // Otimização de Performance: Desliga a renderização do hero canvas quando a Dobra 2 cobre a tela
            ScrollTrigger.create({
                trigger: ".section-dobra-2",
                start: "top top", // Quando o topo da dobra 2 bate no topo da tela (hero 100% coberto)
                onEnter: () => document.getElementById("hero-canvas").style.visibility = "hidden",
                onLeaveBack: () => document.getElementById("hero-canvas").style.visibility = "visible"
            });
        }

    })();
    </script>
</body>
</html>
